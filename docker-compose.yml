services:
  postgres:
    image: postgres:16-alpine
    container_name: hackaton-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hackaton
      POSTGRES_USER: hackaton
      POSTGRES_PASSWORD: hackaton
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackaton"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: hackaton-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
